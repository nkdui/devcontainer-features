name: "Devcontainer test"
on:
  workflow_run:
    workflows: ["Devcontainer validate"]
    types: [completed]
  workflow_dispatch:

jobs:
  check-validate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch' }}
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.event }}" = "pull_request" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "Validate workflow did not succeed. Skipping tests."
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "Validate workflow did not succeed. Skipping tests."
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Not a PR or main branch push. Skipping tests."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  test-autogenerated:
    needs: check-validate
    if: needs.check-validate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - conan
        baseImage:
          - docker.io/library/ubuntu:latest
          - docker.io/library/debian:latest
          - mcr.microsoft.com/devcontainers/base:ubuntu
          - mcr.microsoft.com/devcontainers/base:debian
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    needs: check-validate
    if: needs.check-validate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - conan
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .

  test-global:
    needs: check-validate
    if: needs.check-validate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
